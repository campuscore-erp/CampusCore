# nixpacks.toml — CampusCore University ERP (Railway deployment)
# ─────────────────────────────────────────────────────────────────
# FIX: Use dlib-bin (pre-compiled wheel) instead of compiling dlib
# from source. Compiling dlib from source takes 5–10 min and often
# times out or fails on Railway. dlib-bin ships a ready-made .whl.
#
# NOTE: This file must be in the PROJECT ROOT (same folder as
#       railway.toml), NOT inside the root/ subfolder.
# ─────────────────────────────────────────────────────────────────

[phases.setup]
nixPkgs = [
  "python311",
  "libGL",          # OpenCV: libGL.so.1
  "glib",           # OpenCV: libgthread-2.0.so.0
  "libjpeg",        # Pillow / OpenCV JPEG support
  "libpng",         # OpenCV PNG support
  "zlib",           # compression
  "openssl",        # cryptography package
]

[phases.install]
cmds = [
  # Step 1 — upgrade build tools
  "python3 -m pip install --upgrade pip setuptools wheel",

  # Step 2 — install dlib-bin FIRST (pre-built wheel, no cmake needed)
  "python3 -m pip install dlib-bin",

  # Step 3 — install face_recognition (requires dlib already present)
  "python3 -m pip install face_recognition>=1.3.0",

  # Step 4 — install all other dependencies
  "python3 -m pip install -r root/requirements.txt"
]

[start]
cmd = "cd root && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
