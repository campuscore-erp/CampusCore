[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "libGL", "glib", "libjpeg", "libpng", "zlib", "openssl"]

[phases.install]
cmds = [
  "python3 -m pip install --upgrade pip setuptools wheel --break-system-packages",
  "python3 -m pip install dlib-bin --break-system-packages",
  "python3 -m pip install face_recognition>=1.3.0 --break-system-packages",
  "python3 -m pip install -r root/requirements.txt --break-system-packages"
]

[start]
cmd = "cd root && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
