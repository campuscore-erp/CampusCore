[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "libGL", "glib", "libjpeg", "libpng", "zlib", "openssl"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade",
  "python3 -m pip install --upgrade pip setuptools wheel",
  "python3 -m pip install dlib-bin",
  "python3 -m pip install face_recognition>=1.3.0",
  "python3 -m pip install -r root/requirements.txt"
]

[start]
cmd = "cd root && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
