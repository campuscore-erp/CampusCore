[phases.setup]
nixPkgs = ["libGL", "glib", "libjpeg", "libpng", "zlib", "openssl"]

[phases.install]
cmds = [
  "pip install --upgrade pip setuptools wheel",
  "pip install dlib-bin",
  "pip install face_recognition>=1.3.0",
  "pip install -r root/requirements.txt"
]

[start]
cmd = "cd root && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
