# nixpacks.toml — CampusCore University ERP (Railway)
# Uses dlib-bin which ships pre-built manylinux wheels — no C++ compile needed.

[phases.setup]
nixPkgs = ["python311", "libGL", "glib", "libjpeg", "libpng", "zlib", "openssl", "xorg.libX11", "xorg.libXext", "xorg.libXrender"]

[phases.install]
cmds = [
  "pip install --upgrade pip setuptools wheel",
  "pip install dlib-bin",
  "pip install face_recognition",
  "pip install -r root/requirements.txt"
]

[start]
cmd = "cd root && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"