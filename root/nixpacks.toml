# nixpacks.toml — CampusCore (Railway)
# Strategy: install pre-built dlib wheel to avoid C++ compile timeout

[phases.setup]
nixPkgs = [
  "python311",
  "gcc",
  "g++",
  "cmake",
  "boost",
  "blas",
  "lapack",
  "libffi",
  "openssl",
  "zlib",
  "libjpeg",
  "libpng",
  "libGL",
  "glib",
]

[phases.install]
cmds = [
  "pip install --upgrade pip setuptools wheel",
  "pip install cmake",
  # Install dlib using pre-compiled wheel (avoids timeout)
  "pip install dlib --prefer-binary",
  "pip install face_recognition --prefer-binary",
  "pip install -r root/requirements.txt"
]

[start]
cmd = "cd root && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"